<svg xmlns="http://www.w3.org/2000/svg" width="720" height="520" font-family="'SF Mono','Menlo','Consolas',monospace" font-size="13">
  <defs>
    <style>
      .bg { fill: #1e1e2e; }
      .title-bar { fill: #313244; }
      .title { fill: #cdd6f4; font-size: 12px; }
      .prompt { fill: #89b4fa; }
      .cmd { fill: #cdd6f4; }
      .comment { fill: #6c7086; }
      .blocked { fill: #f38ba8; }
      .allowed { fill: #a6e3a1; }
      .trash { fill: #f9e2af; }
      .dim { fill: #9399b2; }
      .badge-block { fill: #f38ba8; rx: 3; }
      .badge-ok { fill: #a6e3a1; rx: 3; }
      .badge-trash { fill: #f9e2af; rx: 3; }
      .badge-text { fill: #1e1e2e; font-size: 10px; font-weight: bold; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" width="720" height="520" rx="8"/>

  <!-- Title bar -->
  <rect class="title-bar" width="720" height="32" rx="8"/>
  <rect class="bg" y="24" width="720" height="8"/>
  <circle cx="20" cy="16" r="6" fill="#f38ba8"/>
  <circle cx="40" cy="16" r="6" fill="#f9e2af"/>
  <circle cx="60" cy="16" r="6" fill="#a6e3a1"/>
  <text class="title" x="360" y="20" text-anchor="middle">Claude Code — omamori demo</text>

  <!-- Scene 1: Protected path → BLOCKED -->
  <text class="comment" x="20" y="62">&#x276f; Claude Code tries to delete source code</text>

  <text class="prompt" x="20" y="88">$</text>
  <text class="cmd" x="36" y="88">rm -rf src/</text>

  <text class="blocked" x="20" y="110">omamori: rm src/ → block (protected path (matched: src/), original: trash)</text>
  <text class="blocked" x="20" y="128">omamori blocked this command (protected path (matched: src/))</text>

  <rect x="620" y="96" width="80" height="20" rx="3" fill="#f38ba8" opacity="0.2"/>
  <text class="blocked" x="660" y="110" text-anchor="middle" font-size="11" font-weight="bold">BLOCKED</text>

  <!-- Divider -->
  <line x1="20" y1="150" x2="700" y2="150" stroke="#313244" stroke-width="1"/>

  <!-- Scene 2: Regenerable path → log-only -->
  <text class="comment" x="20" y="178">&#x276f; Claude Code removes build artifacts</text>

  <text class="prompt" x="20" y="204">$</text>
  <text class="cmd" x="36" y="204">rm -rf node_modules/</text>

  <text class="allowed" x="20" y="226">omamori: rm node_modules/ → log-only (regenerable path (matched: node_modules/),</text>
  <text class="allowed" x="20" y="244">original: trash)</text>

  <rect x="620" y="212" width="80" height="20" rx="3" fill="#a6e3a1" opacity="0.2"/>
  <text class="allowed" x="660" y="226" text-anchor="middle" font-size="11" font-weight="bold">ALLOWED</text>

  <!-- Divider -->
  <line x1="20" y1="266" x2="700" y2="266" stroke="#313244" stroke-width="1"/>

  <!-- Scene 3: Unknown path → Trash -->
  <text class="comment" x="20" y="294">&#x276f; Claude Code deletes unknown directory</text>

  <text class="prompt" x="20" y="320">$</text>
  <text class="cmd" x="36" y="320">rm -rf data/</text>

  <text class="trash" x="20" y="342">omamori moved the recursive rm targets to Trash instead of deleting them</text>

  <rect x="600" y="328" width="100" height="20" rx="3" fill="#f9e2af" opacity="0.2"/>
  <text class="trash" x="650" y="342" text-anchor="middle" font-size="11" font-weight="bold">MOVED TO TRASH</text>

  <!-- Divider -->
  <line x1="20" y1="364" x2="700" y2="364" stroke="#313244" stroke-width="1"/>

  <!-- Scene 4: Direct terminal → no interference -->
  <text class="comment" x="20" y="392">&#x276f; Direct terminal use — omamori stays silent</text>

  <text class="prompt" x="20" y="418">$</text>
  <text class="cmd" x="36" y="418">rm -rf /tmp/test</text>
  <text class="dim" x="20" y="440">(no omamori output — command runs normally)</text>

  <!-- Footer -->
  <text class="dim" x="20" y="490">omamori only activates when an AI tool environment variable is detected.</text>
  <text class="dim" x="20" y="506">Your terminal commands are never affected.</text>
</svg>
