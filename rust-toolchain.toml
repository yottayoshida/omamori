# Pin stable toolchain for local development and non-fuzz CI jobs.
#
# Fuzz (`.github/workflows/fuzz.yml`) uses nightly and is INTENTIONALLY not
# bound by this file — fuzz corpus is non-deterministic, so re-executing the
# same fuzz run across toolchains is not expected to reproduce bitwise
# results. See plan "Reproducibility boundary" in
# `.claude/plans/2026-04-17-v093-repo-hygiene.md`.
#
# MSRV check (`cargo +1.92 check` in ci.yml) overrides this channel on the fly
# and is unaffected.
[toolchain]
channel = "stable"
components = ["rustfmt", "clippy"]
