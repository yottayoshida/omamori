version: 2

# Weekly grouped updates. Minor + patch bumps are grouped into a single PR
# per ecosystem to keep PR volume manageable; major bumps come as separate
# PRs for individual review.
#
# The `github-actions` ecosystem also updates the SHA pins introduced in
# v0.9.3 PR3 and rewrites the trailing `# vX.Y.Z` comment.

updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Tokyo
    open-pull-requests-limit: 5
    groups:
      cargo-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: cargo
    directory: /fuzz
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Tokyo
    open-pull-requests-limit: 3
    groups:
      fuzz-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Tokyo
    open-pull-requests-limit: 5
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch
