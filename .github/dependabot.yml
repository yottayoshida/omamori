version: 2

# Cargo ecosystem: version-update PRs are NOT generated by dependabot.
# Rationale: omamori is a security-critical, single-maintainer project where
# routine dependabot bumps cost more (review + API migration risk on major
# bumps) than they deliver. CVE detection is independently covered by the
# `Security audit` CI job (cargo-audit against RustSec advisory DB), which
# runs on every push and PR. If a security advisory lands on a current
# dependency, the audit job fails CI; manual `cargo update` resolves it
# under PR review at that point.
#
# Per GitHub docs: dependabot security alerts are independent of dependabot.yml
# and run on a separate internal pipeline. Disabling cargo here does not
# disable security alerts at the repo level.
#
# GitHub Actions ecosystem (v0.9.4, #159): narrowed to monthly patch-only.
# Major and minor bumps are ignored to cut PR noise from Actions upstream
# release cadence. The `github-actions` ecosystem also updates the SHA pins
# introduced in v0.9.3 PR3 and rewrites the trailing `# vX.Y.Z` comment.

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      day: monday
      time: "09:00"
      timezone: Asia/Tokyo
    open-pull-requests-limit: 2
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
    groups:
      actions-patch-only:
        patterns:
          - "*"
