name: Fuzz

on:
  # Nightly schedule: longer fuzz runs
  schedule:
    - cron: '0 3 * * *'
  # PR: short fuzz to catch regressions
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'fuzz/**'
  # Manual trigger
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  # Mirrors ci.yml's action-pin-check so the fuzz workflow's third-party
  # actions cannot execute until their pinning has been validated. Both
  # sentinels share scripts/check-action-pins.sh.
  action-pin-check:
    name: Action pin check (fuzz)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Verify every uses ref is SHA-pinned
        run: ./scripts/check-action-pins.sh

  fuzz:
    name: Fuzz (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: action-pin-check
    strategy:
      fail-fast: false
      matrix:
        target: [fuzz_unwrap, fuzz_hook_input, fuzz_check_command]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions-rust-lang/setup-rust-toolchain@2b1f5e9b395427c92ee4e3331786ca3c37afe2d7 # v1.16.0
        with:
          # Pinned: nightly-2026-05-04+ breaks cargo-fuzz 0.13.1 via rustix 0.36.5
          # (rustc_attrs reservation). Unpin once cargo-fuzz ships a fix.
          toolchain: nightly-2026-05-03

      - name: Install cargo-fuzz
        # taiki-e/install-action does not currently ship cargo-fuzz binaries,
        # so we fall back to `cargo install` with an explicit --locked --version
        # pin. This keeps the supply-chain policy auditable (exact version,
        # locked deps) without a silent registry fallback path.
        run: cargo install --locked --version 0.13.1 cargo-fuzz

      - name: Run fuzz target (${{ matrix.target }})
        run: |
          cd fuzz
          # PR: 30 seconds per target. Nightly: 5 minutes.
          if [ "${{ github.event_name }}" = "schedule" ]; then
            DURATION=300
          else
            DURATION=30
          fi
          cargo +nightly-2026-05-03 fuzz run ${{ matrix.target }} -- -max_total_time=$DURATION

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: fuzz-crash-${{ matrix.target }}
          path: fuzz/artifacts/${{ matrix.target }}/
          # Crash samples can reveal unpublished bugs; cap retention so a
          # stale run does not advertise an open vulnerability indefinitely
          # (security threat-model T9/M8 — accepted risk with 7-day cap).
          retention-days: 7
