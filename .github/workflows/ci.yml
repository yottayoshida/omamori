name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

# Least-privilege default. Jobs that need to write (e.g. upload artifacts,
# publish releases) must override this explicitly — none currently do.
permissions:
  contents: read

# action-pin-check is a *gate*: every job below declares `needs: action-pin-check`
# so no third-party action executes until its pinning has been validated
# (see Codex adversarial-review finding H1 on PR3).
jobs:
  action-pin-check:
    name: Action pin check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Verify every uses ref is SHA-pinned
        run: ./scripts/check-action-pins.sh

  invariants-check:
    name: Invariants check
    runs-on: ubuntu-latest
    needs: action-pin-check
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Enforce SECURITY.md AI-assisted contribution invariants
        run: ./scripts/check-invariants.sh

  test:
    name: Test
    runs-on: macos-latest
    needs: action-pin-check
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions-rust-lang/setup-rust-toolchain@2b1f5e9b395427c92ee4e3331786ca3c37afe2d7 # v1.16.0
      - run: cargo test --locked

  clippy:
    name: Clippy
    runs-on: macos-latest
    needs: action-pin-check
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions-rust-lang/setup-rust-toolchain@2b1f5e9b395427c92ee4e3331786ca3c37afe2d7 # v1.16.0
        with:
          components: clippy
      - run: cargo clippy --locked -- -D warnings

  fmt:
    name: Format
    runs-on: macos-latest
    needs: action-pin-check
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions-rust-lang/setup-rust-toolchain@2b1f5e9b395427c92ee4e3331786ca3c37afe2d7 # v1.16.0
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  publish-dry-run:
    name: Publish dry-run
    runs-on: macos-latest
    needs: action-pin-check
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions-rust-lang/setup-rust-toolchain@2b1f5e9b395427c92ee4e3331786ca3c37afe2d7 # v1.16.0
      - run: cargo publish --dry-run --locked

  msrv:
    name: MSRV check
    runs-on: macos-latest
    needs: action-pin-check
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions-rust-lang/setup-rust-toolchain@2b1f5e9b395427c92ee4e3331786ca3c37afe2d7 # v1.16.0
        with:
          toolchain: "1.92"
      - run: cargo +1.92 check --locked

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: action-pin-check
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions-rust-lang/setup-rust-toolchain@2b1f5e9b395427c92ee4e3331786ca3c37afe2d7 # v1.16.0
      - name: Install cargo-tarpaulin
        # Pin cargo-tarpaulin via taiki-e/install-action. `fallback: none`
        # disables the silent fallback-to-`cargo install`, so a registry
        # hiccup cannot cause the job to silently build an unpinned binary.
        uses: taiki-e/install-action@a2352fc6ce487f030a3aa709482d57823eadfb37 # v2.75.16
        with:
          tool: cargo-tarpaulin@0.35.2
          fallback: none
      - name: Generate coverage
        run: cargo tarpaulin --locked --out xml --skip-clean
      - name: Upload to Codecov
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4.6.0
        with:
          files: cobertura.xml
          fail_ci_if_error: false

  lockfile-sanity:
    name: Lockfile sanity
    runs-on: ubuntu-latest
    needs: action-pin-check
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0  # need origin/main as base for regression check
      - uses: actions-rust-lang/setup-rust-toolchain@2b1f5e9b395427c92ee4e3331786ca3c37afe2d7 # v1.16.0
      - name: Detect direct-dep downgrades
        run: ./scripts/check-lockfile-regressions.sh origin/main

  crate-contents-guard:
    name: Crate contents guard
    runs-on: ubuntu-latest
    needs: action-pin-check
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions-rust-lang/setup-rust-toolchain@2b1f5e9b395427c92ee4e3331786ca3c37afe2d7 # v1.16.0
      - name: Verify crate tarball contents
        run: ./scripts/check-crate-contents.sh

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    needs: action-pin-check
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions-rust-lang/audit@72c09e02f132669d52284a3323acdb503cfc1a24 # v1.2.7
